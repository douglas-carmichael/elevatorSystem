name: ElevatorSystem
options:
  bundleIdPrefix: net.dcarmichael
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: net.dcarmichael.ElevatorSystem
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    DEAD_CODE_STRIPPING: YES

targets:
  ElevatorSystem:
    type: application
    platform: macOS
    sources:
      - path: Sources/ElevatorSystem
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Resources/ElevatorSystem.entitlements
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: ElevatorSystem
        CFBundleDisplayName: Elevator System
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.simulation
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSLocalNetworkUsageDescription: "Discover other elevator controllers on your local network via Bonjour."
        NSBonjourServices:
          - _elevatorsys._tcp
        ATSApplicationFontsPath: "."
